<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biometric Distribution System</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; max-width: 820px; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem 1.25rem; }
      .muted { color: #666; }
      button { padding: 0.5rem 0.85rem; cursor: pointer; margin-right: 0.5rem; }
      pre { background: #f6f8fa; padding: 0.75rem; border-radius: 6px; overflow: auto; }
    </style>
  </head>
  <body>
    <h1>Biometric Distribution System</h1>
    <p class="muted">Web interface is served from <code>/</code>. API routes are under <code>/api/*</code>.</p>

    <div class="card">
      <p><strong>Connection checks</strong></p>
      <button id="health">Check /api/health</button>
      <button id="students">Check /api/students</button>
      <pre id="output">Click a button to test API connectivity.</pre>
    </div>

    <script>
      const output = document.getElementById('output');

      async function call(path) {
        output.textContent = `Loading ${path} ...`;
        try {
          const res = await fetch(path, { headers: { Accept: 'application/json' } });
          const text = await res.text();
          let parsed;
          try {
            parsed = JSON.parse(text);
          } catch {
            parsed = { raw: text.slice(0, 300) };
          }

          output.textContent = JSON.stringify({
            ok: res.ok,
            status: res.status,
            contentType: res.headers.get('content-type'),
            data: parsed
          }, null, 2);
        } catch (error) {
          output.textContent = JSON.stringify({ ok: false, error: error.message }, null, 2);
        }
      }

      document.getElementById('health').addEventListener('click', () => call('/api/health'));
      document.getElementById('students').addEventListener('click', () => call('/api/students'));
    </script>
  </body>
</html>
