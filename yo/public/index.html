<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biometric Distribution System (Legacy Base)</title>
  </head>
  <body>
    <h1>Biometric Distribution System</h1>
    <p>This is the legacy <code>yo/</code> base-directory fallback UI.</p>
    <p>Use the primary interface at repo-root deploy path when possible.</p>
    <pre id="out">Checking /api/health ...</pre>
    <script>
      fetch('/api/health')
        .then(async (r) => ({ status: r.status, body: await r.text() }))
        .then((data) => { document.getElementById('out').textContent = JSON.stringify(data, null, 2); })
        .catch((e) => { document.getElementById('out').textContent = e.message; });
    </script>
  </body>
</html>
